[pytest]
minversion = 6.0
addopts =
    -ra
    -q
    --cov=src
    --cov=api
    --cov-report=term-missing
    --cov-report=html
testpaths =
    tests

markers =
    unit: Marks tests as unit tests
    integration: Marks tests as integration tests
    api: Marks API endpoint tests
    slow: Marks tests that take a long time to run (like model inference)

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
