artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  kaggle_dataset: "nazmul0087/ct-kidney-dataset-normal-cyst-tumor-and-stone"
  local_data_file: artifacts/data_ingestion/data.zip
  unzip_dir: artifacts/data_ingestion/CT-KIDNEY-DATASET

data_validation:
  root_dir: artifacts/data_validation
  valid_classes:
    - Cyst
    - Normal
    - Stone
    - Tumor
  min_images_per_class: 100
  allowed_extensions:
    - .jpg
    - .jpeg
    - .png
  status_file: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  data_dir: artifacts/data_ingestion/CT-KIDNEY-DATASET
  image_size: [380, 380]
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  batch_size: 32

prepare_base_model:
  root_dir: artifacts/prepare_base_model
  base_model_path: artifacts/prepare_base_model/base_model.h5
  updated_base_model_path: artifacts/prepare_base_model/base_model_updated.h5
  image_size: [380, 380, 3]
  include_top: false
  weights: imagenet
  classes: 4

model_trainer:
  root_dir: artifacts/model_trainer
  base_model_path: artifacts/prepare_base_model/base_model_updated.h5
  trained_model_path: artifacts/model_trainer/model.keras
  checkpoint_path: artifacts/model_trainer/checkpoints/model_epoch_{epoch:02d}.keras
  csv_log_path: artifacts/model_trainer/training_log.csv
  history_plot_path: artifacts/model_trainer/training_history.png
  class_weights_path: artifacts/model_trainer/class_weights.json

model_evaluation:
  root_dir: artifacts/model_evaluation
  metrics_path: reports/evaluation/metrics.json
  confusion_matrix_path: reports/evaluation/confusion_matrix.png
  roc_curve_path: reports/evaluation/roc_curve.png

gradcam:
  root_dir: artifacts/gradcam
  colormap: jet
  alpha: 0.4
  last_conv_layer_name: top_conv

drift_detection:
  root_dir: reports/drift
  reference_data_path: data/reference_features.csv
  current_data_path: data/current_features.csv
  drift_threshold: 0.15

prediction:
  model_path: artifacts/model_trainer/model.keras
  mc_dropout_iterations: 20
  uncertainty_threshold: 0.15
  confidence_threshold: 0.70

report:
  output_dir: reports/predictions
  disclaimer: >
    This report is generated by an AI decision-support tool for research
    purposes only. It is NOT a clinical diagnosis. Always consult a
    qualified radiologist for medical decisions.

model_hub:
  repo_id: "Himel000/kidney-tumor-efficientnetb4"
  model_filename: "model.keras"
