name: Data Drift Detection

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Typical version for modern DL/FastAPI stacks
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run drift check
        id: drift_check
        env:
          PYTHONPATH: .
        run: |
          # Run the existing drift detection script and capture output
          OUTPUT=$(python scripts/test_drift_detection.py)
          echo "$OUTPUT"

          # Check if drift was detected from the script's output
          if echo "$OUTPUT" | grep -q "Drift detected: True"; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT

            # Extract drift score for the issue body
            DRIFT_SCORE=$(echo "$OUTPUT" | grep "Drift score:" | cut -d':' -f2 | xargs)
            echo "drift_score=$DRIFT_SCORE" >> $GITHUB_OUTPUT

            # Extract drifted features for the issue body
            DRIFTED_FEATURES=$(echo "$OUTPUT" | grep "Drifted features:" | cut -d':' -f2- | xargs)
            echo "drifted_features=$DRIFTED_FEATURES" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Issue if drift is detected
        if: steps.drift_check.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Data Drift Detected in Production Model",
              body: `### Data Drift Alert

              Data drift has been detected during the scheduled check. The model's performance might degrade.

              - **Drift Score:** ${'${{ steps.drift_check.outputs.drift_score }}'}
              - **Drifted Features:** ${'${{ steps.drift_check.outputs.drifted_features }}'}

              Please review the drift report in \`reports/drift\` and consider retraining the model with recent data.

              *This issue was automatically generated by the Data Drift Detection workflow.*`,
              labels: ['data-drift', 'automated-issue', 'model-monitoring']
            })
