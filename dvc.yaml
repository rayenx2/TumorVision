stages:
  data_ingestion:
    cmd: python src/pipeline/stage_01_data_ingestion.py
    deps:
      - src/pipeline/stage_01_data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/CT-KIDNEY-DATASET

  data_validation:
    cmd: python src/pipeline/stage_02_data_validation.py
    deps:
      - src/pipeline/stage_02_data_validation.py
      - config/config.yaml
      - artifacts/data_ingestion/CT-KIDNEY-DATASET
    outs:
      - artifacts/data_validation/status.txt

  data_transformation:
    cmd: python src/pipeline/stage_03_data_transformation.py
    deps:
      - src/pipeline/stage_03_data_transformation.py
      - config/config.yaml
      - artifacts/data_ingestion/CT-KIDNEY-DATASET
    outs:
      - artifacts/data_transformation

  prepare_base_model:
    cmd: python src/pipeline/stage_04_prepare_base_model.py
    deps:
      - src/pipeline/stage_04_prepare_base_model.py
      - config/config.yaml
    outs:
      - artifacts/prepare_base_model

  model_training:
    cmd: python src/pipeline/stage_05_model_training.py
    deps:
      - src/pipeline/stage_05_model_training.py
      - config/config.yaml
      - artifacts/data_transformation
      - artifacts/prepare_base_model/base_model_updated.h5
    outs:
      - artifacts/model_trainer/model.keras
      - artifacts/model_trainer/training_log.csv
      - artifacts/model_trainer/training_history.png

  model_evaluation:
    cmd: python src/pipeline/stage_06_model_evaluation.py
    deps:
      - src/pipeline/stage_06_model_evaluation.py
      - config/config.yaml
      - artifacts/model_trainer/model.keras
      - artifacts/data_transformation
    outs:
      - reports/evaluation/metrics.json
      - reports/evaluation/confusion_matrix.png
      - reports/evaluation/roc_curve.png
